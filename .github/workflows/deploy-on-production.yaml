name: Deploy on Production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'

permissions:
  contents: read

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to O2Switch
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    if: github.actor == 'mattrbdr'
    env:
      CPANEL_USER: ${{ secrets.CPANEL_USER }}
      CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
      CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load deployment config
        id: config
        run: |
          set -euo pipefail
          set -a
          . ./.github/deploy/o2switch-production.env
          set +a

          for name in ALLOWED_ACTOR DEPLOY_BRANCH NODE_VERSION INSTALL_COMMAND CHECK_COMMANDS BUILD_COMMAND BUILD_OUTPUT REMOTE_PATH BACKUP_PATH KEEP_BACKUPS; do
            echo "${name}=${!name}" >> "$GITHUB_ENV"
          done
          echo "node_version=${NODE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Guard production deployment
        run: |
          set -euo pipefail
          test "${GITHUB_ACTOR}" = "${ALLOWED_ACTOR}"
          test "${GITHUB_REF_NAME}" = "${DEPLOY_BRANCH}"
          for secret_name in CPANEL_USER CPANEL_HOST CPANEL_API_TOKEN SSH_KEY; do
            test -n "${!secret_name:-}" || { echo "Missing GitHub secret: ${secret_name}"; exit 1; }
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.config.outputs.node_version }}
          cache: npm

      - name: Install dependencies
        run: bash -lc "$INSTALL_COMMAND"

      - name: Check project
        run: bash -lc "$CHECK_COMMANDS"

      - name: Build static site
        run: bash -lc "$BUILD_COMMAND"

      - name: Validate build output
        run: test -f "${BUILD_OUTPUT}/index.html"

      - name: Prepare deployment artifact
        run: |
          rm -rf production
          mkdir -p production/site
          cp -a "${BUILD_OUTPUT}/." production/site/

      - name: Get runner public IP
        id: ip
        uses: haythem/public-ip@v1.3

      - name: Whitelist runner IP
        run: |
          set -euo pipefail
          AUTH="Authorization: cpanel ${CPANEL_USER}:${CPANEL_API_TOKEN}"
          curl --fail-with-body -sS -H "$AUTH" "https://${CPANEL_HOST}:2083/execute/SshWhitelist/remove_all"
          curl --fail-with-body -sS -H "$AUTH" "https://${CPANEL_HOST}:2083/execute/SshWhitelist/add?address=${{ steps.ip.outputs.ipv4 }}&port=22"

      - name: Install SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 400 ~/.ssh/id_rsa

      - name: Backup current production
        id: backup
        run: |
          set -euo pipefail
          BACKUP_NAME="production-backup-$(date +%Y%m%d-%H%M%S)"
          echo "backup_name=${BACKUP_NAME}" >> "$GITHUB_OUTPUT"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa "${CPANEL_USER}@${CPANEL_HOST}" << EOF
            set -euo pipefail
            cd ~
            mkdir -p "${BACKUP_PATH}"
            if [ -d "${REMOTE_PATH}" ]; then
              cp -r "${REMOTE_PATH}" "${BACKUP_PATH}/${BACKUP_NAME}"
            else
              mkdir -p "${REMOTE_PATH}"
            fi
          EOF

      - name: Deploy static files
        run: |
          set -euo pipefail
          rsync --timeout=60 -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" --delete -av production/site/ "${CPANEL_USER}@${CPANEL_HOST}:/home/${CPANEL_USER}/${REMOTE_PATH}/"

      - name: Verify deployment and prune backups
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa "${CPANEL_USER}@${CPANEL_HOST}" << EOF
            set -euo pipefail
            cd ~
            test -f "${REMOTE_PATH}/index.html"
            cd "${BACKUP_PATH}"
            ls -t | tail -n +"$((KEEP_BACKUPS + 1))" | xargs -r rm -rf
          EOF

      - name: Roll back on failure
        if: failure() && steps.backup.outputs.backup_name != ''
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa "${CPANEL_USER}@${CPANEL_HOST}" << EOF
            set -euo pipefail
            cd ~
            rm -rf "${REMOTE_PATH}"
            cp -r "${BACKUP_PATH}/${{ steps.backup.outputs.backup_name }}" "${REMOTE_PATH}"
          EOF

      - name: Remove runner IP and SSH key
        if: always()
        run: |
          curl -sS -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_API_TOKEN}" "https://${CPANEL_HOST}:2083/execute/SshWhitelist/remove?address=${{ steps.ip.outputs.ipv4 }}&port=22" || true
          rm -rf ~/.ssh
